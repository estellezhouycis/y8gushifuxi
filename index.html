<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>古诗复习 - 专业笔顺挑战版</title>
    <!-- 引入汉字笔顺核心库 -->
    <script src="https://cdn.jsdelivr.net/npm/hanzi-writer@3.5/dist/hanzi-writer.min.js"></script>
    <style>
        :root { --bg-color: #fdf6e3; --theme-color: #859900; }
        body { 
            background: var(--bg-color); margin: 0; 
            font-family: "STKaiti", "KaiTi", "楷体", serif; 
            display: flex; flex-direction: column; align-items: center;
            touch-action: none; overflow: hidden;
        }

        /* 界面层级 */
        #login-screen, #menu-screen, #result-screen {
            position: fixed; top: 0; left: 0; width: 100%; height: 100%;
            background: var(--bg-color); z-index: 100;
            display: flex; flex-direction: column; align-items: center; justify-content: center;
        }

        .btn {
            padding: 12px 25px; margin: 8px; font-size: 20px;
            background: white; border: 2px solid var(--theme-color);
            border-radius: 12px; cursor: pointer; font-family: inherit;
            box-shadow: 0 4px 0 var(--theme-color);
        }
        .btn:active { transform: translateY(2px); box-shadow: none; }

        /* 游戏主区域 */
        #game-container { 
            width: 100%; height: 100vh; display: flex; flex-direction: column; 
            align-items: center; padding-top: 10px; overflow-y: auto; touch-action: pan-y; 
        }
        #timer-box { font-size: 22px; color: #cb4b16; font-weight: bold; margin-bottom: 5px; }
        
        #game-header { text-align: center; margin-bottom: 10px; }
        #title-display { font-size: 28px; color: #2c3e50; margin: 5px 0; font-weight: bold; }
        #author-info { font-size: 18px; color: #586e75; margin-bottom: 5px; }

        #poetry-display {
            width: 90%; max-width: 700px; background: rgba(255,255,255,0.9);
            padding: 15px; border-radius: 15px; margin-bottom: 15px;
            box-shadow: 0 4px 15px rgba(0,0,0,0.05);
        }
        .sentence-row { display: flex; flex-wrap: wrap; justify-content: center; margin-bottom: 8px; font-size: 28px; }
        .char-placeholder { width: 34px; border-bottom: 2px solid #bdc3c7; margin: 0 3px; text-align: center; color: transparent; }
        .char-revealed { color: #2c3e50; border-bottom: none; animation: pop 0.3s; }
        .hard-char { color: #e74c3c !important; font-weight: bold; }

        /* 交互区 */
        #slot-area { 
            width: 90%; max-width: 600px; min-height: 60px; background: #2c3e50; 
            border-radius: 12px; display: flex; flex-wrap: wrap; 
            align-items: center; justify-content: center; gap: 8px; padding: 10px; margin-bottom: 15px;
        }
        .slot { width: 48px; height: 48px; background: #ecf0f1; border-radius: 8px; display: flex; align-items: center; justify-content: center; font-size: 28px; }

        #pool { 
            display: grid; grid-template-columns: repeat(auto-fit, minmax(55px, 1fr)); 
            gap: 12px; width: 90%; max-width: 600px; padding: 15px; 
            background: rgba(255,255,255,0.5); border: 2px dashed #93a1a1; border-radius: 15px;
        }
        .char-card { width: 55px; height: 55px; background: white; border: 2px solid #34495e; border-radius: 10px; display: flex; align-items: center; justify-content: center; font-size: 28px; box-shadow: 0 4px 0 #34495e; }

        /* 描摹层 */
        #trace-overlay {
            position: fixed; top: 0; left: 0; width: 100%; height: 100%;
            background: rgba(0,0,0,0.92); z-index: 200;
            display: none; flex-direction: column; align-items: center; justify-content: center;
        }
        #writer-container {
            width: 320px; height: 320px; background: #fff; 
            border: 5px solid #e74c3c; border-radius: 10px;
            position: relative;
        }
        .trace-info { color: white; margin-bottom: 15px; font-size: 20px; text-align: center; }

        .hidden { display: none !important; }
        @keyframes pop { from { transform: scale(1.3); } to { transform: scale(1); } }
    </style>
</head>
<body>

<div id="login-screen">
    <h1 style="color:#2c3e50;">古诗复习笔顺挑战</h1>
    <input type="text" id="user-name" placeholder="请输入姓名" style="padding:12px; font-size:18px; border-radius:10px; border:2px solid #95a5a6; width:220px; text-align:center; font-family:inherit;">
    <button class="btn" onclick="showMenu()">进入系统</button>
</div>

<div id="menu-screen" class="hidden">
    <h2 style="color:#2c3e50;">请选择复习诗歌</h2>
    <div id="menu-list" style="display:grid; grid-template-columns: 1fr 1fr; gap:10px;"></div>
</div>

<div id="game-container" class="hidden">
    <div id="timer-box">用时：<span id="seconds">0</span> 秒</div>
    <div id="game-header">
        <div id="title-display"></div>
        <div id="author-info"></div>
        <div id="student-tag" style="font-size:14px; color:#7f8c8d;"></div>
    </div>
    <div id="poetry-display"></div>
    <div id="slot-area"></div>
    <div id="pool"></div>
    <div id="msg" style="color:#e74c3c; font-weight:bold; height:30px; margin-top:10px;"></div>
    <button class="btn" style="font-size:14px; background:#eee;" onclick="location.reload()">返回菜单</button>
</div>

<!-- 描摹层 -->
<div id="trace-overlay">
    <div class="trace-info" id="trace-text-hint">
        请按正确笔顺描摹：<span id="trace-char-name" style="font-size:36px; color:#e74c3c; font-weight:bold;"></span><br>
        <span id="trace-sub-hint" style="font-size:14px; color:#aaa;">(写错笔画将无法通过)</span>
    </div>
    <div id="writer-container"></div>
    <div style="margin-top:20px;">
        <button id="demo-btn" class="btn" onclick="demoStroke()" style="background:#3498db; color:white; border-color:#2980b9;">笔顺演示</button>
        <button id="reset-btn" class="btn" onclick="resetTrace()">重写</button>
        <button id="next-trace-btn" class="btn hidden" style="background:#e74c3c; color:white;" onclick="finishTrace()">继续</button>
    </div>
</div>

<div id="result-screen" class="hidden">
    <h2 style="color:#27ae60;">复习完成！</h2>
    <div id="result-content" style="background:white; padding:25px; border-radius:15px; width:80%; max-width:450px; font-size:18px; line-height:1.8;"></div>
    <button class="btn" onclick="location.reload()">再测一首</button>
</div>

<script>
    const poetryData = [
        { title: "赠汪伦", dynasty: "唐", author: "李白", sentences: ["李白乘舟将欲行", "忽闻岸上踏歌声", "桃花潭水深千尺", "不及汪伦送我情"], hard: ["乘", "欲", "潭"], traps: ["乖", "预", "滩"], color: "#fdf6e3", type: "jueju" },
        { title: "凉州词", dynasty: "唐", author: "王翰", sentences: ["葡萄美酒夜光杯", "欲饮琵琶马上催", "醉卧沙场君莫笑", "古来征战几人回"], hard: ["琵", "琶", "催", "汉"], traps: ["琴", "崔", "汗"], color: "#eee8d5", type: "jueju" },
        { title: "出塞", dynasty: "唐", author: "王昌龄", sentences: ["秦时明月汉时关", "万里长征人未还", "但使龙城飞将在", "不教胡马度阴山"], hard: ["秦", "度"], traps: ["泰", "渡"], color: "#eef2f3", type: "jueju" },
        { title: "送元二使安西", dynasty: "唐", author: "王维", sentences: ["渭城朝雨浥轻尘", "客舍青青柳色新", "劝君更进一杯酒", "西出阳关无故人"], hard: ["渭", "浥", "柳", "进"], traps: ["谓", "邑", "卯", "近"], color: "#f0f9eb", type: "jueju" },
        { title: "别董大", dynasty: "唐", author: "高适", sentences: ["千里黄云白日曛", "北风吹雁雪纷纷", "莫愁前路无知己", "天下谁人不识君"], hard: ["曛", "识"], traps: ["熏", "试"], color: "#fff9eb", type: "jueju" },
        { title: "春夜喜雨", dynasty: "唐", author: "杜甫", sentences: ["好雨知时节", "当春乃发生", "随风潜入夜", "润物细无声", "野径云俱黑", "江船火独明", "晓看红湿处", "花重锦官城"], hard: ["潜", "润", "晓", "俱"], traps: ["替", "闰", "绕", "具"], color: "#f5f5f5", type: "lvshi" }
    ];

    let userName = "", currentPoetry = null, timer = null, seconds = 0;
    let currentPhase = 0, currentSentenceInPhase = 0, selectedChars = [], hardCharsToTrace = [], writer = null;

    function showMenu() {
        userName = document.getElementById('user-name').value.trim();
        if(!userName) return alert("请输入姓名");
        document.getElementById('login-screen').classList.add('hidden');
        document.getElementById('menu-screen').classList.remove('hidden');
        const list = document.getElementById('menu-list');
        list.innerHTML = '';
        poetryData.forEach((p, idx) => {
            const b = document.createElement('button');
            b.className = 'btn'; b.innerText = p.title;
            b.onclick = () => startChallenge(idx);
            list.appendChild(b);
        });
    }

    function startChallenge(idx) {
        currentPoetry = poetryData[idx];
        currentPhase = 0; currentSentenceInPhase = 0; seconds = 0;
        document.body.style.backgroundColor = currentPoetry.color;
        document.getElementById('menu-screen').classList.add('hidden');
        document.getElementById('game-container').classList.remove('hidden');
        document.getElementById('title-display').innerText = `《${currentPoetry.title}》`;
        document.getElementById('author-info').innerText = `[${currentPoetry.dynasty}] ${currentPoetry.author}`;
        document.getElementById('student-tag').innerText = `挑战者：${userName}`;
        initPoetryDisplay(); startTimer(); loadPhase();
    }

    function startTimer() { clearInterval(timer); timer = setInterval(() => { seconds++; document.getElementById('seconds').innerText = seconds; }, 1000); }

    function initPoetryDisplay() {
        const container = document.getElementById('poetry-display');
        container.innerHTML = '';
        currentPoetry.sentences.forEach((s, sIdx) => {
            const row = document.createElement('div'); row.className = 'sentence-row';
            s.split('').forEach((char, cIdx) => {
                const span = document.createElement('span'); span.className = 'char-placeholder'; span.id = `target-${sIdx}-${cIdx}`; span.innerText = char; row.appendChild(span);
            });
            const punc = document.createElement('span'); punc.innerText = (sIdx % 2 === 0) ? "，" : "。"; row.appendChild(punc); container.appendChild(row);
        });
    }

    function loadPhase() {
        const pool = document.getElementById('pool'); pool.innerHTML = ''; selectedChars = [];
        let start = currentPhase * 4;
        let end = currentPoetry.type === "jueju" ? 4 : (currentPhase + 1) * 4;
        let phaseSentences = currentPoetry.sentences.slice(start, end);
        let allChars = phaseSentences.join('').split('').map(c => ({c, isTrap: false}));
        currentPoetry.traps.forEach(t => allChars.push({c: t, isTrap: true}));
        allChars.sort(() => Math.random() - 0.5);

        allChars.forEach(item => {
            const card = document.createElement('div'); card.className = 'char-card'; card.innerText = item.c;
            card.onclick = () => {
                let sIdx = start + currentSentenceInPhase;
                let targetText = currentPoetry.sentences[sIdx];
                if(selectedChars.length < targetText.length) {
                    card.style.visibility = 'hidden'; selectedChars.push({item, card});
                    renderSlots(targetText.length);
                    if(selectedChars.length === targetText.length) checkSentence(sIdx);
                }
            };
            pool.appendChild(card);
        });
        renderSlots(currentPoetry.sentences[start].length);
    }

    function renderSlots(len) {
        const area = document.getElementById('slot-area'); area.innerHTML = '';
        for(let i=0; i<len; i++){
            const s = document.createElement('div'); s.className = 'slot';
            s.innerText = selectedChars[i] ? selectedChars[i].item.c : '';
            s.onclick = () => { if(selectedChars[i]) { selectedChars[i].card.style.visibility = 'visible'; selectedChars.splice(i, 1); renderSlots(len); } };
            area.appendChild(s);
        }
    }

    function checkSentence(sIdx) {
        const target = currentPoetry.sentences[sIdx];
        const answer = selectedChars.map(d => d.item.c).join('');
        if(answer === target) {
            let currentHard = target.split('').filter(c => currentPoetry.hard.includes(c));
            target.split('').forEach((char, i) => {
                const el = document.getElementById(`target-${sIdx}-${i}`);
                el.classList.add('char-revealed');
                if(currentPoetry.hard.includes(char)) el.classList.add('hard-char');
            });
            if(currentHard.length > 0) { hardCharsToTrace = currentHard; setTimeout(() => startTracing(), 600); } 
            else { nextStep(); }
        } else {
            document.getElementById('msg').innerText = "❌ 顺序不对或选错字了";
            setTimeout(() => document.getElementById('msg').innerText = "", 2500);
        }
    }

    function startTracing() {
        if (hardCharsToTrace.length === 0) {
            document.getElementById('trace-overlay').style.display = 'none';
            nextStep();
            return;
        }
        
        const char = hardCharsToTrace.shift();
        const container = document.getElementById('writer-container');
        document.getElementById('trace-overlay').style.display = 'flex';
        document.getElementById('trace-char-name').innerText = char;
        document.getElementById('next-trace-btn').classList.add('hidden');
        document.getElementById('trace-sub-hint').innerText = "(写错笔画将无法通过)";
        document.getElementById('demo-btn').classList.remove('hidden');
        document.getElementById('reset-btn').classList.remove('hidden');
        
        container.innerHTML = '<div id="loading-hint" style="text-align:center; padding-top:140px; color:#999;">正在加载笔顺数据...</div>';

        writer = HanziWriter.create('writer-container', char, {
            width: 320, height: 320, padding: 20, showOutline: true,
            strokeAnimationSpeed: 1, delayBetweenStrokes: 200,
            charDataLoader: function(char, onComplete) {
                fetch(`https://cdn.jsdelivr.net/npm/hanzi-writer-data@2.0/${char}.json`)
                    .then(res => res.json())
                    .then(data => {
                        const hint = document.getElementById('loading-hint');
                        if(hint) hint.remove();
                        onComplete(data);
                    })
                    .catch(err => {
                        // 如果加载失败，切换到自动演示模式
                        const hint = document.getElementById('loading-hint');
                        if(hint) hint.innerText = "数据加载失败，改为自动演示笔顺";
                        setTimeout(() => triggerAutoDemo(char), 1000);
                    });
            },
            onComplete: () => { document.getElementById('next-trace-btn').classList.remove('hidden'); }
        });
        writer.quiz();
    }

    // 自动演示逻辑：当描摹无法进行时触发
    function triggerAutoDemo(char) {
        document.getElementById('trace-sub-hint').innerText = "(网络异常，请观察笔顺演示)";
        document.getElementById('demo-btn').classList.add('hidden');
        document.getElementById('reset-btn').classList.add('hidden');
        
        // 尝试重新初始化一个只演示的writer
        document.getElementById('writer-container').innerHTML = '';
        let demoWriter = HanziWriter.create('writer-container', char, {
            width: 320, height: 320, padding: 20, showOutline: true,
            strokeAnimationSpeed: 0.8, delayBetweenStrokes: 300
        });
        demoWriter.animateCharacter({
            onComplete: () => {
                document.getElementById('next-trace-btn').classList.remove('hidden');
            }
        });
    }

    function demoStroke() { if(writer) { writer.animateCharacter(); setTimeout(() => writer.quiz(), 2500); } }
    function resetTrace() { if(writer) writer.quiz(); document.getElementById('next-trace-btn').classList.add('hidden'); }
    function finishTrace() { startTracing(); }

    function nextStep() {
        selectedChars = []; currentSentenceInPhase++;
        let totalSentences = currentPoetry.sentences.length;
        if(currentSentenceInPhase + (currentPhase * 4) < totalSentences) {
            if(currentPoetry.type === "lvshi" && currentSentenceInPhase === 4) {
                currentPhase = 1; currentSentenceInPhase = 0; alert("前半部分完成！准备挑战后半部分。"); loadPhase();
            } else {
                renderSlots(currentPoetry.sentences[currentPhase*4 + currentSentenceInPhase].length);
            }
        } else { clearInterval(timer); showFinalResult(); }
    }

    function showFinalResult() {
        document.getElementById('game-container').classList.add('hidden');
        document.getElementById('result-screen').classList.remove('hidden');
        document.getElementById('result-content').innerHTML = `
            <center><strong>《${currentPoetry.title}》复习报告</strong></center><hr>
            <strong>姓名：</strong> ${userName}<br>
            <strong>作者：</strong> [${currentPoetry.dynasty}] ${currentPoetry.author}<br>
            <strong>总计用时：</strong> <span style="color:#e74c3c; font-size:24px;">${seconds}</span> 秒<br><br>
            恭喜你完成了全诗背诵、拼写以及难点字的笔顺练习！
        `;
    }
</script>
</body>
</html>
